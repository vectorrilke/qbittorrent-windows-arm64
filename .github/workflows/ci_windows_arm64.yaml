name: Build for Windows ARM64

on:
  workflow_dispatch:
  push:
    branches:
      - fix/remove-ci-hotfix
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-arm64:
    name: Build
    runs-on: windows-latest
    env:
      boost_path: "${{ github.workspace }}/../boost"
      libtorrent_path: "${{ github.workspace }}/libtorrent-msvc-arm64"
      qt_path: "${{ github.workspace }}/../qt-msvc-arm64"
      boost_version: "1.91.0"
      libt_version: "2.0.13"
      qbt_version: "5.2.2"
      qt_version: "6.10.3"
      qbt_url_base: "https://github.com/qbittorrent/qBittorrent/archive/refs/tags"
      qbt_url_prefix: "release-"
      qbt_url_suffix: ".tar.gz"
      boost_url: "https://archives.boost.io/release/{version}/source/boost_{version_underscored}.7z"

      

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup devcmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Install build tools
        run: |
          choco install ninja

      # use the preinstalled vcpkg from image
      # https://github.com/actions/virtual-environments/blob/main/images/win/Windows2019-Readme.md#package-management
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v10
        with:
          vcpkgDirectory: C:/vcpkg
          doNotUpdateVcpkg: true  # the preinstalled vcpkg is updated regularly

      # Fix backslashes for CMake strings to prevent '\v' escape errors
      - name: Sanitize vcpkg path for CMake
        shell: pwsh
        run: |
          if (-not $env:RUNVCPKG_VCPKG_ROOT) {
            throw "RUNVCPKG_VCPKG_ROOT is not set"
          }
          $clean_path = $env:RUNVCPKG_VCPKG_ROOT -replace '\\','/'
          echo "RUNVCPKG_VCPKG_ROOT=$clean_path" >> $env:GITHUB_ENV
          echo "VCPKG_CMAKE_ROOT=$clean_path" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=$clean_path" >> $env:GITHUB_ENV
      
      - name: Install dependencies from vcpkg
        shell: pwsh
        run: |
          # clear buildtrees after each package installation to reduce disk space requirements
          $packages = `
            "openssl:arm64-windows-static-release",
            "zlib:arm64-windows-static-release"
          $VcpkgRoot = $env:VCPKG_ROOT
          if (-not $VcpkgRoot) {
            throw "VCPKG_ROOT is not set"
          }
          $VcpkgRoot = $VcpkgRoot -replace '\\','/'
          & "$VcpkgRoot/vcpkg.exe" upgrade `
            --no-dry-run
          & "$VcpkgRoot/vcpkg.exe" install `
            --clean-after-build `
            $packages

      # added to build url based on version and server
      - name: Build Boost URL
        shell: pwsh
        run: |
          function Build-Url {
              param(
                  [string]$version,
                  [string]$template
              )

              # Convert dotted to underscored
              $v_u = $version -replace '\.', '_'

              # Replace placeholders
              $url = $template `
                  -replace '\{version\}', $version `
                  -replace '\{version_underscored\}', $v_u

              return $url
          }
          $url = Build-Url "${{ env.boost_version }}" "${{ env.boost_url }}"
          echo "boost_url=$url" >> $env:GITHUB_ENV

      - name: Install boost
        run: |
          aria2c `
            "${{ env.boost_url }}" `
            -d "${{ runner.temp }}" `
            -o "boost.7z"
          7z x "${{ runner.temp }}/boost.7z" -o"${{ github.workspace }}/.."
          move "${{ github.workspace }}/../boost_*" "${{ env.boost_path }}"

        # added to build url based on version and server
      - name: Build qBittorrent URL
        shell: pwsh
        run: |
          $url = "${{ env.qbt_url_base }}/${{ env.qbt_url_prefix }}${{ env.qbt_version }}${{ env.qbt_url_suffix }}"
          echo "qbt_url=$url" >> $env:GITHUB_ENV

      - name: Install Qt (host x64)
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: "${{ env.qt_version }}"
          archives: 'qtbase qttools'
          set-env: 'false'
          dir: 'C:'

      - name: Verify Environment and CMake
        run: |
          echo "Target Version: ${{ env.qt_version }}"
          cmake --version
          ninja --version 2>&1 || echo "Ninja not found"

      - name: Install Qt (target arm64)
        shell: pwsh
        run: |
          $env:Path = "C:\Qt\${{ env.qt_version }}\msvc2022_64\bin;" + $env:Path
          $VcpkgRoot = $env:RUNVCPKG_VCPKG_ROOT
          if (-not $VcpkgRoot) {
              throw "RUNVCPKG_VCPKG_ROOT is not set"
          }
          $VcpkgRoot = $VcpkgRoot -replace '\\','/'
          $env:VCPKG_ROOT = $VcpkgRoot
          $env:VCPKG_CMAKE_ROOT = $VcpkgRoot
          Write-Host "Normalized Vcpkg root for Qt configure: $VcpkgRoot"

          git clone https://github.com/qt/qt5.git qt6
          cd qt6
          git checkout "v${{ env.qt_version }}"
          ./configure -init-submodules -submodules qtbase,qtsvg
          rm CMakeCache.txt
          ./configure -opensource -confirm-license -nomake tests -nomake examples `
            -static -static-runtime -release -xplatform win32-arm64-msvc `
            -prefix "${{ env.qt_path }}" `
            -qt-host-path "C:/Qt/${{ env.qt_version }}/msvc2022_64" `
            -schannel -qt-sqlite -sql-sqlite -no-sql-mysql -no-sql-odbc -no-sql-psql -c++std c++20 -- `
            -DCMAKE_PREFIX_PATH="$VcpkgRoot/installed/arm64-windows-static-release" `
            -DCMAKE_TOOLCHAIN_FILE="$VcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=arm64-windows-static-release 
         
          cmake --build .
          cmake --install .

      - name: Install libtorrent
        shell: pwsh
        run: |
          git clone `
            --branch v${{ env.libt_version }} `
            --depth 1 `
            --recurse-submodules `
            https://github.com/arvidn/libtorrent.git
          cd libtorrent
          $VcpkgRoot = $env:RUNVCPKG_VCPKG_ROOT
          if (-not $VcpkgRoot) {
            throw "RUNVCPKG_VCPKG_ROOT is not set"
          }
          $VcpkgRoot = $VcpkgRoot -replace '\\','/'
          $env:VCPKG_ROOT = $VcpkgRoot
          $env:VCPKG_CMAKE_ROOT = $VcpkgRoot
          $VcpkgToolchain = "$VcpkgRoot/scripts/buildsystems/vcpkg.cmake"
          cmake `
            -B build `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ env.libtorrent_path }}" `
            -DCMAKE_TOOLCHAIN_FILE="$VcpkgToolchain" `
            -DBOOST_ROOT="${{ env.boost_path }}" `
            -DBUILD_SHARED_LIBS=OFF `
            -Ddeprecated-functions=OFF `
            -Dstatic_runtime=ON `
            -DVCPKG_TARGET_TRIPLET=arm64-windows-static-release
          cmake --build build
          cmake --install build
          
      - name: Build qBittorrent
        shell: pwsh
        run: |
          # Resolve your custom ARM64 Qt path cleanly
          $AbsoluteQtPath = (Get-Item "${{ env.qt_path }}").FullName.Replace('\\', '/')
          $HostQtPath = "C:/Qt/${{ env.qt_version }}/msvc2022_64"
          # Derive vcpkg installed path from the raw RUNVCPKG_VCPKG_ROOT and normalize separators
          $VcpkgRoot = $env:RUNVCPKG_VCPKG_ROOT
          if (-not $VcpkgRoot) {
            throw "RUNVCPKG_VCPKG_ROOT is not set in the environment"
          }
          $VcpkgRoot = $VcpkgRoot -replace '\\','/'
          $VcpkgInstalledPath = "$VcpkgRoot/installed/arm64-windows-static-release"
          Write-Host "Derived VcpkgInstalledPath: $VcpkgInstalledPath"
          Write-Host "Listing top-level of $VcpkgInstalledPath"
          Get-ChildItem -Path $VcpkgInstalledPath -Force -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          Write-Host "Listing libs under $VcpkgInstalledPath/lib (first 200 entries)"
          Get-ChildItem -Path "$VcpkgInstalledPath/lib" -Recurse -Force -ErrorAction SilentlyContinue | Select-Object -First 200 | ForEach-Object { Write-Host $_.FullName }
          
          $env:path = "$AbsoluteQtPath/bin;$env:path"
          $env:LDFLAGS+=" /FORCE:MULTIPLE"
          aria2c "${{ env.qbt_url }}"
          tar -xf qbittorrent-release-${{ env.qbt_version }}.tar.gz
          cd qbittorrent-release-${{ env.qbt_version }}

          $ZlibIncludeDir = "$VcpkgInstalledPath/include"

          $OpenSslIncludeDir = "$VcpkgInstalledPath/include"
          $OpenSslCryptoCandidates = @(
            "$VcpkgInstalledPath/lib/libcrypto.lib",
            "$VcpkgInstalledPath/lib/crypto.lib"
          )
          $OpenSslCryptoLibrary = $OpenSslCryptoCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $OpenSslCryptoLibrary) {
            $OpenSslCryptoLibrary = Get-ChildItem -Path "$VcpkgInstalledPath/lib" -Filter "libcrypto*.lib" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
          }
          if ($OpenSslCryptoLibrary) {
            $OpenSslCryptoLibrary = $OpenSslCryptoLibrary.Replace('\\', '/')
          } else {
            throw "Could not locate libcrypto.lib under $VcpkgInstalledPath"
          }

          $OpenSslSslCandidates = @(
            "$VcpkgInstalledPath/lib/libssl.lib",
            "$VcpkgInstalledPath/lib/ssl.lib"
          )
          $OpenSslSslLibrary = $OpenSslSslCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $OpenSslSslLibrary) {
            $OpenSslSslLibrary = Get-ChildItem -Path "$VcpkgInstalledPath/lib" -Filter "libssl*.lib" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
          }
          if (-not $OpenSslSslLibrary) {
            throw "Could not locate libssl.lib under $VcpkgInstalledPath"
          }

          $BoostRoot = (Get-Item "${{ env.boost_path }}").FullName.Replace('\\','/')
          $LibtorrentRasterbarDir = (Get-Item "${{ env.libtorrent_path }}").FullName.Replace('\\','/') + '/lib/cmake/LibtorrentRasterbar'
          $cmakeArgs = @(
            '-B', 'build',
            '-G', 'Ninja',
            '-DCMAKE_BUILD_TYPE=Release',
            "-DCMAKE_PREFIX_PATH=$AbsoluteQtPath;$HostQtPath;$VcpkgInstalledPath",
            "-DQT_HOST_PATH=$HostQtPath",
            "-DQt6_DIR=$AbsoluteQtPath/lib/cmake/Qt6",
            "-DCMAKE_TOOLCHAIN_FILE=$VcpkgRoot/scripts/buildsystems/vcpkg.cmake",
            '-DVCPKG_MANIFEST_MODE=OFF',
            "-DBOOST_ROOT=$BoostRoot",
            "-DLibtorrentRasterbar_DIR=$LibtorrentRasterbarDir",
            "-DOPENSSL_ROOT_DIR=$VcpkgInstalledPath",
            "-DOPENSSL_INCLUDE_DIR=$OpenSslIncludeDir",
            "-DOPENSSL_CRYPTO_LIBRARY=$OpenSslCryptoLibrary",
            "-DOPENSSL_SSL_LIBRARY=$OpenSslSslLibrary",
            '-DOPENSSL_USE_STATIC_LIBS=TRUE',
            "-DZLIB_ROOT=$VcpkgInstalledPath",
            "-DZLIB_INCLUDE_DIR=$ZlibIncludeDir",
            '-DMSVC_RUNTIME_DYNAMIC=OFF',
            '-DSTACKTRACE=OFF',
            '-DQT_NO_PRIVATE_MODULE_WARNING=ON',
            '-DVCPKG_TARGET_TRIPLET=arm64-windows-static-release'
          )
          $cmakeArgs += '-DZLIB_USE_STATIC_LIBS=TRUE'

          Write-Host "Invoking cmake with arguments:`n$($cmakeArgs -join ' ')"
          & cmake @cmakeArgs
          cmake --build build

      - name: Prepare build artifacts
        run: |
          mkdir upload
          copy qbittorrent-release-${{ env.qbt_version }}/build/qbittorrent.exe upload
          copy qbittorrent-release-${{ env.qbt_version }}/dist/windows/qt.conf upload
          cd upload
          7z a qbittorrent_${{ env.qbt_version }}_arm64.zip *
          mv qbittorrent_${{ env.qbt_version }}_arm64.zip ..

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qBittorrent_${{ env.qbt_version }}_arm64
          path: upload
     
      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.qbt_version }}     # <-- add this line
          name: qBittorrent ${{ env.qbt_version }} (Windows ARM64)
          files: qbittorrent_${{ env.qbt_version }}_arm64.zip
          draft: false
          prerelease: false
          body: |
            ### Build Dependency Components:
            * **qBittorrent:** ${{ env.qbt_version }}
            * **Libtorrent:** ${{ env.libt_version }}
            * **Boost:** ${{ env.boost_version }}
            * **Qt:** ${{ env.qt_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
